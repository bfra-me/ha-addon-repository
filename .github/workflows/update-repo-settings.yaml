# Update repository settings to match the definitions in .github/settings.yml.
---
name: Update Repo Settings

'on':
  push:
    branches: [main]
  schedule:
    - cron: '15 14 * * *' # 14:15 UTC every day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-repo-settings:
    name: Update Repo Settings
    secrets: inherit
    uses: bfra-me/.github/.github/workflows/update-repo-settings.yaml@78beeaad42b28db4116d6121406aa75506146013 # v4.16.1
