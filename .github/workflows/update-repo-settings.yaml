# Update repository settings to match the definitions in .github/settings.yml.
---
name: Update Repo Settings

'on':
  push:
    branches: [main]
  schedule:
    - cron: '15 14 * * *' # 14:15 UTC every day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-repo-settings:
    name: Update Repo Settings
    secrets: inherit
    uses: bfra-me/.github/.github/workflows/update-repo-settings.yaml@8aa43db5bbf98926c053f905fe93e9adbc790cec # v4.13.5
